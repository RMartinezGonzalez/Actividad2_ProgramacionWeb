<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2 - Utileria JS</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/utileria.js"></script>
    <script src="./js/script.js" defer></script>
</head>
<body>
    <div class="modal hidden">
        <p class="modal-texto"></p>
    </div>
    <header>
        <h1 class="title">Registro Datos Genéricos</h1>
        <p class="autor">Martinez Gonzalez Ricardo</p>
    </header>
    <main>
        <form action="" class="contenido">
            <div class="form-item">
                <label for="">Nombre</label>
                <input type="text" name="nombreInput" id="nombreInput" placeholder="Nombre:" required>
            </div>
            <div class="form-item">
                <label for="">Apellido Marterno</label>
                <input type="text" name="apellidoMInput" id="apellidoMInput" placeholder="Apellido Materno:" required>
            </div>
            <div class="form-item">
                <label for="">Apellido Paterno</label>
                <input type="text" name="apellidoPInput" id="apellidoPInput" placeholder="Apellido Paterno:" required>
            </div>
            <div class="form-item">
                <label for="">Fecha de Nacimiento</label>
                <input type="date" name="fechaInput" id="fechaInput" placeholder="Fecha de nacimiento:" required>
            </div>
            <div class="form-item">
                <label for="">Correo electrónico</label>
                <input type="text" name="correoInput" id="correoInput" placeholder="Correo:" required>
            </div>
            <div class="form-item">
                <label for="">Contraseña</label>
                <input type="password" name="contraInput" id="contraInput" placeholder="Contraseña:" required>
            </div>
            <div class="form-item form-botones">
                <button class="registrar" type="button" onclick="validar()">Registrase</button>
                <a href="./login.html" class="registrar" type="button">Ir al login</a>
            </div>
        </form>
    </main>
</body>
</html>
